agent:
  name: "AutoWorker-1"
  loop_interval_seconds: 5
  max_iterations: 1000
  api_timeout: 30
api:
  model: "kimi-k2.5-free"
  base_url: "https://api.nvidia.com/v1"
  temperature: 0.1
memory:
  storage_path: "data/memory.json"
safety:
  allow_system_commands: false
  allow_file_deletion: false
  max_retries: 3
