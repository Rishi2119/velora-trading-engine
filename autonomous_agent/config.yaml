agent:
  name: "AutoWorker-1"
  loop_interval_seconds: 30       # seconds between each analysis cycle
  max_iterations: 10000           # effectively infinite for 24/7 operation
  api_timeout: 30

api:
  model: "moonshot-ai/kimi-k2-instruct"  # correct NVIDIA model ID for Kimi K2
  base_url: "https://integrate.api.nvidia.com/v1"
  temperature: 0.1

memory:
  storage_path: "data/memory.json"

trading:
  # ── IMPORTANT ────────────────────────────────────────────────────────────
  # Set enable_live_execution to true ONLY when:
  #   1. MT5 is connected (use the mobile app MT5 screen to connect)
  #   2. You have verified the strategy in paper mode first
  #   3. You understand real money is at risk
  # ─────────────────────────────────────────────────────────────────────────
  enable_live_execution: true    # true = real MT5 orders, false = simulation
  kill_switch_file: "../mobile_api/KILL_SWITCH.txt"
  mt5_api_base: "http://127.0.0.1:5050"
  max_spread_pips: 2.0
  default_volume: 0.01            # lots per trade (very conservative default)
  allowed_symbols:
    - "EURUSD"
    - "GBPUSD"
    - "USDCAD"
    - "AUDUSD"
    - "NZDUSD"
    - "USDJPY"

safety:
  allow_system_commands: false
  allow_file_deletion: false
  max_retries: 3
  min_confidence_threshold: 0.65  # agent must be 65%+ confident to execute
