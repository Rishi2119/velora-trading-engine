[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "velora-backend"
source = "."
